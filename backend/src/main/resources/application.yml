server:
  port: ${PORT:4720}

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:UrbanNexus}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS0yNTZiaXRzLW1pbmltdW0tc28taXQtY2FuLWJlLXVzZWQ=}
    expiration: 86400000 # 24 hours in milliseconds
  twilio:
    sid: ${TWILIO_SID:your_sid}
    token: ${TWILIO_AUTH_TOKEN:your_token}
    phone: ${TWILIO_PHONE:your_phone}

logging:
  level:
    org.springframework.jdbc.core.JdbcTemplate: DEBUG
